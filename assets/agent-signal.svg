<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YoungsPlace agent signal dashboard</title>
  <desc id="desc">Animated blue and green dashboard-style profile banner with grid, agent lanes, and pulsing signal nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061426"/>
      <stop offset="0.45" stop-color="#062B32"/>
      <stop offset="1" stop-color="#073B5D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#10B981" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(22)">
      <stop stop-color="#E6FFFA"/>
      <stop offset="0.35" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#38BDF8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="panelClip">
      <rect x="34" y="34" width="1132" height="292" rx="26"/>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect x="34" y="34" width="1132" height="292" rx="26" fill="#061426" fill-opacity="0.58" stroke="#38BDF8" stroke-opacity="0.36"/>

  <g clip-path="url(#panelClip)">
    <rect x="-240" y="58" width="260" height="244" fill="#38BDF8" fill-opacity="0.08">
      <animate attributeName="x" values="-260;1220" dur="7.5s" repeatCount="indefinite"/>
    </rect>
    <path d="M70 278 C250 205 315 238 430 165 C555 86 665 139 780 95 C930 38 1015 122 1130 73" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="18 22;48 16;18 22" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M70 119 C210 60 352 114 460 183 C590 268 710 247 820 191 C946 127 1018 174 1130 136" stroke="#10B981" stroke-opacity="0.48" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.22;0.7;0.22" dur="4.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="72" y="92" fill="#7DD3FC" font-size="17" letter-spacing="2">YOUNGSPLACE / AGENT WORKFLOW LAB</text>
    <text x="72" y="136" fill="#E6FFFA" font-size="34" font-weight="700">small patches, real proof, better tools</text>
    <text x="74" y="174" fill="#A7F3D0" font-size="17">issue-first contributor signal for AI tooling, automation, CLI/TUI UX</text>

    <g transform="translate(74 216)">
      <rect width="210" height="52" rx="14" fill="#0F766E" fill-opacity="0.22" stroke="#10B981" stroke-opacity="0.5"/>
      <text x="18" y="22" fill="#10B981" font-size="13" font-weight="700">LANE 01</text>
      <text x="18" y="40" fill="#E6FFFA" font-size="15">repro → patch</text>
    </g>
    <g transform="translate(316 216)">
      <rect width="210" height="52" rx="14" fill="#075985" fill-opacity="0.26" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text x="18" y="22" fill="#38BDF8" font-size="13" font-weight="700">LANE 02</text>
      <text x="18" y="40" fill="#E6FFFA" font-size="15">tests → checks</text>
    </g>
    <g transform="translate(558 216)">
      <rect width="210" height="52" rx="14" fill="#0F766E" fill-opacity="0.22" stroke="#10B981" stroke-opacity="0.5"/>
      <text x="18" y="22" fill="#10B981" font-size="13" font-weight="700">LANE 03</text>
      <text x="18" y="40" fill="#E6FFFA" font-size="15">review → merge</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <circle cx="1015" cy="106" r="14" fill="url(#node)">
      <animate attributeName="r" values="12;18;12" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1082" cy="182" r="10" fill="url(#node)">
      <animate attributeName="r" values="9;15;9" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="961" cy="246" r="12" fill="url(#node)">
      <animate attributeName="r" values="10;17;10" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#7DD3FC" opacity="0.9">
    <text x="934" y="80">status: online</text>
    <text x="934" y="304">theme: green/blue</text>
  </g>
</svg>
